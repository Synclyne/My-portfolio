<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="products.css">
  <link rel="stylesheet" href="products2.css">
  <script src="https://kit.fontawesome.com/86b537907d.js" crossorigin="anonymous"></script>
</head>
<body class="products-page">

  <!-- ===== NAV ===== -->

  <!-- ===== PRODUCTS SECTION ===== -->
  <section class="products-section">
    <div class="products">

      <a href="work.html?id=1" class="card short">
        <img src="images/work-1.png" alt="Social Media App">
        <h3>Social Media App</h3>
      </a>

      <a href="work.html?id=2" class="card tall">
        <img src="images/work-2.png" alt="Music App">
        <h3>Music App</h3>
      </a>

      <a href="work.html?id=3" class="card short">
        <img src="images/work-3.png" alt="Shopping App">
        <h3>Shopping App</h3>
      </a>

      <a href="work.html?id=4" class="card tall">
        <img src="images/trvel.jpg" alt="Portfolio Project">
        <h3>Airplane Ticket App</h3>
      </a>

      <a href="work.html?id=5" class="card tall">
        <img src="images/train_app.jpg" alt="Photography App">
        <h3>Train Ticket App</h3>
      </a>

      <a href="work.html?id=6" class="card tall">
        <img src="images/deli.jpg" alt="Fitness App">
        <h3>Food Delivery App</h3>
      </a>

      <a href="work.html?id=7" class="card short">
        <img src="images/calen.jpg" alt="Food Delivery App">
        <h3>Calendar App</h3>
      </a>

      <a href="work.html?id=8" class="card short">
        <img src="images/do-list.jpg" alt="Travel App">
        <h3>Schedule App</h3>
      </a>

    </div>
  </section>

  <!-- ===== JS ===== -->
  <script>
    /* ===== MOBILE MENU ===== */
    var sidemenu = document.getElementById("sidemenu");

    function openmenu() {
        sidemenu.classList.add("active");
        document.body.style.overflow = "hidden";
    }

    function closemenu() {
        sidemenu.classList.remove("active");
        document.body.style.overflow = "";
    }

    /* ===== HERO ANIMATION ===== */
    window.addEventListener('DOMContentLoaded', () => {
        const heroText = document.querySelector('.header-text');
        const ctaButton = document.querySelector('.hero-cta');

        setTimeout(() => {
            if (heroText) heroText.classList.add('visible');
            if (ctaButton) ctaButton.classList.add('visible');
        }, 100);
    });

    /* ===== PINTEREST-STYLE CARD SPAN ===== */
    window.addEventListener('load', () => {
      const cards = document.querySelectorAll('.products-section .card');
      cards.forEach(card => {
        const rowHeight = parseInt(getComputedStyle(card.parentElement).getPropertyValue('grid-auto-rows'));
        const rowGap = parseInt(getComputedStyle(card.parentElement).getPropertyValue('gap'));
        const cardHeight = card.querySelector('img').getBoundingClientRect().height;
        const span = Math.ceil((cardHeight + rowGap) / (rowHeight + rowGap));
        card.style.setProperty('--span', span);
      });
    });
  </script>

</body>
</html>
