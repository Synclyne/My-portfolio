<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="mobile.css">
    <script src="https://kit.fontawesome.com/86b537907d.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="header">
        <div class="container">
            <nav>
                <!-- <h1 class="logo me-auto"><a href="index.html">SYNC CRTV</a></h1> -->
            <!-- <a href="#header"><img src="images/logo.png" class="logo"></a>     -->
                <h1 class="logo me-auto">
                    <a href="index.html">
                        <span class="highlight">SYNC</span><br> CRTV
                    </a>
                </h1>
                <ul id="sidemenu">
                    <li><a href="#header">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#portfolio">Portfolio</a></li>
                    <li><a href="#contact">Contact</a></li>
                    <i class="fa-solid fa-xmark" onclick="closemenu()"></i>
                </ul>
                <i class="fa-solid fa-bars" onclick="openmenu()"></i>
            </nav>
        </div>
    
    
<script>
const products = {
  1: {
    title: "Social Media App",
    images: [
      "images/work-1.png",
      "img/AirForce1DesertKhaki2.webp",
      "img/AirForce1DesertKhaki3.webp"
    ],
    desc: "A modern social media application designed to connect people across the world. It features a clean and intuitive user interface, real-time messaging, and seamless interaction between users. Built with a strong focus on user experience, the app allows users to share content, discover new communities, and engage with others globally."
  },

  2: {
    title: "Music App",
    images: [
      "images/work-2.png",
      "img/products/n1.jpg",
      "img/products/n2.jpg"
    ],
    desc: "A sleek and immersive music streaming application that brings global music to your fingertips. Users can explore trending songs, create playlists, and enjoy a smooth listening experience with a beautifully designed interface focused on simplicity and performance."
  },

  3: {
    title: "Shopping App",
    images: [
      "images/work-3.png",
      "img/products/f1.jpg",
      "img/products/f2.jpg",
      "images/user2.jpg"
    ],
    desc: "An online shopping platform designed to connect buyers and sellers worldwide. It offers a seamless browsing experience, clean product displays, and an intuitive layout that makes shopping effortless while showcasing modern e-commerce design principles."
  }
};
</script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const product = products[id];
</script>


<div class="product-container">

  <!-- LEFT -->
  <div class="product-images">
    <img id="main-img" src="">
  </div>

  <!-- RIGHT -->
  <div class="product-details">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <div id="thumbnails"></div>
  </div>

</div>

<script>
if (product) {
  document.getElementById("title").innerText = product.title;
  document.getElementById("desc").innerText = product.desc;

  const mainImg = document.getElementById("main-img");
  const thumbs = document.getElementById("thumbnails");

  mainImg.src = product.images[0];

  product.images.forEach((img, index) => {
    const t = document.createElement("img");
    t.src = img;

    // set first image as active
    if (index === 0) t.classList.add("active");

    t.onclick = () => {
  const mainImg = document.getElementById("main-img");

  // fade out
  mainImg.style.opacity = 0;

  setTimeout(() => {
    // swap image after fade out
    mainImg.src = img;

    // fade in
    mainImg.style.opacity = 1;
  }, 200); // matches half of the transition duration

  // update active thumbnail
  document.querySelectorAll("#thumbnails img")
    .forEach(i => i.classList.remove("active"));
  t.classList.add("active");
};

    thumbs.appendChild(t);
  });
}
</script>

<script>
/* ===== MOBILE MENU ===== */
var sidemenu = document.getElementById("sidemenu");

function openmenu() {
    sidemenu.classList.add("active");
    document.body.style.overflow = "hidden";
}

function closemenu() {
    sidemenu.classList.remove("active");
    document.body.style.overflow = "";
}

/* ===== HERO ANIMATION ===== */
window.addEventListener('DOMContentLoaded', () => {
    const heroText = document.querySelector('.header-text');
    const ctaButton = document.querySelector('.hero-cta');

    setTimeout(() => {
        if (heroText) heroText.classList.add('visible');
        if (ctaButton) ctaButton.classList.add('visible');
    }, 100);
});
</script>
</div>

</body>
</html>
